name: capsula
description: A dynamic animated capsule overlay showing live battery charging status, inspired by Samsung One UI Now Bar.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  battery_plus: ^5.0.1
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  flutter_overlay_window: ^0.4.1
  permission_handler: ^11.1.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
