name: Build & Release Capsula APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java (required by Android Gradle) ──────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Flutter SDK ────────────────────────────────────────────────────
      - name: Set up Flutter (stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # ── 4. Dependencies ───────────────────────────────────────────────────
      - name: Install Flutter dependencies
        working-directory: capsula
        run: flutter pub get

      # ── 5. Code analysis ──────────────────────────────────────────────────
      - name: Analyze project
        working-directory: capsula
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      # ── 6. Build release APK ─────────────────────────────────────────────
      - name: Build release APK
        working-directory: capsula
        run: flutter build apk --release --no-shrink

      # ── 7. Upload APK artifact ────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: capsula-release-apk
          path: capsula/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      # ── 8. Create GitHub Release (on push to main) ────────────────────────
      - name: Get version from pubspec
        id: version
        working-directory: capsula
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | tr -d '\r')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: Capsula v${{ steps.version.outputs.version }} (build ${{ github.run_number }})
          body: |
            ## Capsula APK — Automated Build

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Build:** #${{ github.run_number }}

            ### What's inside
            - Pulse Glow, Fluid Fill, and Orbit Particles animations
            - Draggable overlay with real-time battery sync
            - Full customization panel (size, opacity, corner radius, position)

            ### Installation
            1. Download `app-release.apk`
            2. On your Android device, enable **Install unknown apps** for your file manager
            3. Open the APK and install
            4. Open Capsula, grant **Display over other apps** permission
            5. Tap **Launch Overlay**
          files: capsula/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
